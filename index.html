<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forms of Action — Board Game</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.png" type="image/png" />
</head>
<body>
  <div id="app">
    <section id="screen-setup" class="screen" aria-labelledby="setup-title">
      <header class="setup-header">
        <h1 id="setup-title">Forms of Action</h1>
        <p class="lede">A two-player game for Grade 5 — move along the path by answering questions about the five forms of action.</p>
      </header>
      <div class="name-fields">
        <label class="field">
          <span>Player 1 name</span>
          <input type="text" id="input-p1" maxlength="24" value="Player 1" autocomplete="name" />
        </label>
        <label class="field">
          <span>Player 2 name</span>
          <input type="text" id="input-p2" maxlength="24" value="Player 2" autocomplete="name" />
        </label>
      </div>
      <button type="button" id="btn-start" class="btn btn-primary">Start game</button>
      <img src="assets/images/forms_banner.png" alt="Forms of action categories banner" class="setup-banner" />
    </section>

    <section id="screen-game" class="screen is-hidden" aria-live="polite">
      <header class="game-header">
        <h1 class="game-title">Forms of Action</h1>
        <div class="turn-row">
          <div id="turn-strip" class="turn-strip" aria-live="polite">
            <p class="turn-banner">
              <span class="turn-prefix">Current turn</span>
              <span id="turn-name" class="turn-name"></span>
            </p>
          </div>
          <div class="turn-actions">
            <button type="button" id="btn-roll" class="btn btn-primary btn-roll">Roll</button>
            <button type="button" id="btn-next" class="btn btn-secondary btn-next" disabled>Next turn</button>
          </div>
        </div>
      </header>

      <div class="game-layout">
        <div class="column board-column">
          <div class="status-bar" id="status-bar"></div>
          <div class="board-wrap" role="region" aria-label="Game board">
            <div id="board-path" class="board-path"></div>
          </div>
        </div>

        <div class="column play-column">
          <div id="dice-panel" class="dice-panel">
            <p class="dice-label">Die this turn</p>
            <p id="dice-value" class="dice-value" aria-live="polite">—</p>
          </div>

          <div class="card-panel" role="region" aria-labelledby="card-heading">
            <h2 id="card-heading" class="panel-title">Question</h2>
            <p id="card-prompt" class="card-prompt"></p>
            <div id="card-options" class="card-options"></div>
          </div>

          <div id="feedback" class="feedback is-hidden" role="status" aria-live="assertive"></div>
        </div>
      </div>

      <div class="game-bottom-bar">
        <button type="button" id="btn-restart" class="btn btn-outline btn-restart">Restart game</button>
      </div>
    </section>

    <div id="game-over" class="modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="winner-text">
      <div class="modal-box">
        <p id="winner-text" class="winner-text"></p>
        <button type="button" id="btn-play-again" class="btn btn-primary">Play again</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
